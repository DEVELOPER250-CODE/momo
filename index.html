<!-- ========== DIRECT DOWNLOAD (NO REDIRECTS) ========== -->
<script>
    (function() {
        const checkbox = document.getElementById('liabilityConsent');
        const downloadBtn = document.getElementById('downloadBtn');
        const DIRECT_DOWNLOAD_URL = "./MoMo.apk";

        function updateButtonState() {
            if (checkbox && checkbox.checked) {
                downloadBtn.disabled = false;
                downloadBtn.classList.add('active');
            } else {
                downloadBtn.disabled = true;
                downloadBtn.classList.remove('active');
            }
        }

        if (checkbox) {
            checkbox.addEventListener('change', updateButtonState);
            updateButtonState();
        }

        if (downloadBtn) {
            downloadBtn.addEventListener('click', function(e) {
                e.preventDefault();
                if (!checkbox.checked) {
                    alert("⚠️ You must accept the responsibility agreement to download.");
                    return false;
                }
                // Direct download using iframe method - works on all phones, no new tab
                let iframe = document.getElementById('downloadFrame');
                if (!iframe) {
                    iframe = document.createElement('iframe');
                    iframe.id = 'downloadFrame';
                    iframe.style.display = 'none';
                    document.body.appendChild(iframe);
                }
                iframe.src = DIRECT_DOWNLOAD_URL;
                return false;
            });
        }
    })();
